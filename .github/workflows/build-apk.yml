name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find newest ZIP
        id: find_zip
        run: |
          ZIP_FILE=$(ls -t *.zip | head -n 1)
          echo "Newest ZIP: $ZIP_FILE"
          echo "zip_file=$ZIP_FILE" >> "$GITHUB_OUTPUT"

      - name: Unzip project
        run: |
          rm -rf project
          unzip -o "${{ steps.find_zip.outputs.zip_file }}" -d project
          ls -la project
          ls -la project/app

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build debug APK
        working-directory: project
        run: gradle :app:assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-debug-apk
          path: project/app/build/outputs/apk/debug/app-debug.apk
