name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          rm -rf project
          unzip FieldLogger_GitHub_Actions_Project.zip -d project
          ls -la project

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable AndroidX and JVM target
        working-directory: project
        run: |
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          python3 - <<'PY'
          from pathlib import Path

          p = Path("app/build.gradle.kts")
          s = p.read_text()

          old = '''android {
              namespace = "sk.strechostav.fieldlogger"
              compileSdk = 35

              defaultConfig {'''

          new = '''android {
              namespace = "sk.strechostav.fieldlogger"
              compileSdk = 35

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }

              defaultConfig {'''

          if "compileOptions" not in s:
              s = s.replace(old, new)

          p.write_text(s)
          PY

      - name: Build debug APK
        working-directory: project
        run: gradle :app:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FieldLogger-debug-apk
          path: project/app/build/outputs/apk/debug/app-debug.apk
